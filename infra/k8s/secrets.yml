# ============================================================
# Secrets — Credenciales MySQL
#
# IMPORTANTE: Este archivo contiene los nombres de los secrets
# pero NO los valores reales. Los valores deben ser creados
# manualmente en el clúster usando:
#
#   kubectl create secret generic mysql-secret \
#     --from-literal=MYSQL_ROOT_PASSWORD=<tu_password> \/
#     --from-literal=MYSQL_DATABASE=<tu_db> \
#     --from-literal=MYSQL_USER=<tu_usuario> \
#     --from-literal=MYSQL_PASSWORD=<tu_password> \
#     --from-literal=SPRING_DATASOURCE_USERNAME=<tu_usuario> \
#     --from-literal=SPRING_DATASOURCE_PASSWORD=<tu_password>
#
# O bien usando AWS Secrets Manager / Parameter Store para
# mayor seguridad en producción.
#
# NO subir este archivo con valores reales al repositorio.
# ============================================================

# Este archivo es solo referencia de estructura.
# Para aplicar secrets reales, usar el comando kubectl de arriba
# o un gestor externo como AWS Secrets Manager + External Secrets Operator.
